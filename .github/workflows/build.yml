name: build
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # setup-java provides JDK 11 and handles the Maven dependency cache.
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Show toolchain
        run: |
          java -version
          mvn -version

      - name: Build and test
        shell: bash
        run: |
            set -o pipefail
            mvn -B clean verify | tee maven-build.log

      - name: Upload Maven build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-log
          path: maven-build.log
          retention-days: 90

      - name: Upload Surefire test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            target/surefire-reports/*.xml
            target/surefire-reports/*.txt
          retention-days: 90
