name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'   # triggers on tags like v1.0.0

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK and Maven settings
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'           # matches maven.compiler.release
          server-id: central           # matches publishingServerId
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Derive version from tag
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Publish
        run: mvn --batch-mode --no-transfer-progress -P release -Drevision=${RELEASE_VERSION} clean deploy
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
